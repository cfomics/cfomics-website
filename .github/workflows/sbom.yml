name: SBOM

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    name: Generate and assess CycloneDX SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate CycloneDX SBOM
        run: |
          npx --yes @cyclonedx/cdxgen@12.7.1 \
            -t npm \
            --spec-version 1.6 \
            -o cfomics.cdx.json

      - name: Add SBOM metadata
        shell: pwsh
        run: |
          $path = "cfomics.cdx.json"

          $sbom = Get-Content $path -Raw | ConvertFrom-Json

          if (-not $sbom.metadata) {
            $sbom | Add-Member `
              -NotePropertyName metadata `
              -NotePropertyValue ([PSCustomObject]@{}) `
              -Force
          }

          $sbom.metadata | Add-Member `
            -NotePropertyName authors `
            -NotePropertyValue @(
              [PSCustomObject]@{
                name  = "CFOmics Product Security"
                email = "security@cfomics.com"
              }
            ) `
            -Force

          if (-not $sbom.metadata.component) {
            $sbom.metadata | Add-Member `
              -NotePropertyName component `
              -NotePropertyValue ([PSCustomObject]@{}) `
              -Force
          }

          $component = $sbom.metadata.component

          $component | Add-Member `
            -NotePropertyName type `
            -NotePropertyValue "application" `
            -Force

          $component | Add-Member `
            -NotePropertyName name `
            -NotePropertyValue "CFOmics Website" `
            -Force

          $component | Add-Member `
            -NotePropertyName version `
            -NotePropertyValue "0.1.0" `
            -Force

          $component | Add-Member `
            -NotePropertyName supplier `
            -NotePropertyValue ([PSCustomObject]@{
              name = "CFOmics"
            }) `
            -Force

          $component | Add-Member `
            -NotePropertyName properties `
            -NotePropertyValue @(
              [PSCustomObject]@{
                name  = "cdx:bsi:component:function"
                value = "Business advisory website"
              },
              [PSCustomObject]@{
                name  = "cdx:bsi:component:source"
                value = "CFOmics"
              }
            ) `
            -Force

          $sbom |
            ConvertTo-Json -Depth 100 |
            Set-Content $path -Encoding utf8

      - name: Verify SBOM metadata
        shell: pwsh
        run: |
          $sbom = Get-Content "cfomics.cdx.json" -Raw |
            ConvertFrom-Json

          Write-Host "SBOM creator:"
          $sbom.metadata.authors | Format-List *

          Write-Host "Main component:"
          $sbom.metadata.component | Format-List *

      - name: Install sbomqs
        run: |
          SBOMQS_VERSION="v1.2.0"

          curl --fail --location \
            --output sbomqs \
            "https://github.com/interlynk-io/sbomqs/releases/download/${SBOMQS_VERSION}/sbomqs-linux-amd64"

          chmod +x sbomqs
          sudo mv sbomqs /usr/local/bin/sbomqs

          sbomqs version

      - name: Score SBOM quality
        run: |
          sbomqs score cfomics.cdx.json --json > sbom-quality.json

          SCORE=$(jq -r '.files[0].avg_score' sbom-quality.json)
          echo "SBOM quality score: ${SCORE}/10"

      - name: Assess BSI TR-03183-2 compliance
        continue-on-error: true
        run: |
          sbomqs compliance \
            --bsi-v2 \
            cfomics.cdx.json \
            --json > bsi-compliance.json

          echo "BSI compliance assessment:"
          cat bsi-compliance.json

      - name: Upload SBOM evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cfomics-sbom-${{ github.sha }}
          path: |
            cfomics.cdx.json
            sbom-quality.json
            bsi-compliance.json
          if-no-files-found: warn
          retention-days: 30