name: SBOM

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    name: Generate and assess CycloneDX SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate CycloneDX SBOM
        run: |
          npx --yes @cyclonedx/cdxgen@12.7.1 \
            -t npm \
            --required-only \
            --no-babel \
            --spec-version 1.6 \
            -o cfomics.cdx.json

      - name: Add SBOM creator metadata
        run: |
          jq '
            .metadata.authors = [
              {
                "name": "CFOmics Product Security",
                "email": "security@cfomics.com"
              }
            ]
          ' cfomics.cdx.json > cfomics.tmp.json

          mv cfomics.tmp.json cfomics.cdx.json

      - name: Verify SBOM metadata
        run: |
          echo "SBOM format:"
          jq -r '.bomFormat' cfomics.cdx.json

          echo "Specification version:"
          jq -r '.specVersion' cfomics.cdx.json

          echo "SBOM creator:"
          jq '.metadata.authors' cfomics.cdx.json

          echo "Main component:"
          jq '.metadata.component | {
            type,
            name,
            version,
            purl
          }' cfomics.cdx.json

          echo "Component count:"
          jq '.components | length' cfomics.cdx.json

          echo "Dependency node count:"
          jq '.dependencies | length' cfomics.cdx.json

      - name: Install sbomqs
        run: |
          SBOMQS_VERSION="v1.2.0"

          curl --fail --location \
            --output sbomqs \
            "https://github.com/interlynk-io/sbomqs/releases/download/${SBOMQS_VERSION}/sbomqs-linux-amd64"

          chmod +x sbomqs
          sudo mv sbomqs /usr/local/bin/sbomqs

          sbomqs version

      - name: Score SBOM quality
        run: |
          sbomqs score cfomics.cdx.json --json > sbom-quality.json

          SCORE=$(jq -r '.files[0].avg_score' sbom-quality.json)
          echo "SBOM quality score: ${SCORE}/10"

      - name: Assess BSI TR-03183-2 compliance
        continue-on-error: true
        run: |
          sbomqs compliance \
            --bsi-v2 \
            cfomics.cdx.json \
            --json > bsi-compliance.json

          TOTAL_SCORE=$(jq -r '.summary.total_score' bsi-compliance.json)
          REQUIRED_SCORE=$(jq -r '.summary.required_elements_score' bsi-compliance.json)

          echo "BSI total score: ${TOTAL_SCORE}/10"
          echo "BSI required-elements score: ${REQUIRED_SCORE}/10"

          echo "Document-level failures:"
          jq '
            .sections[]
            | select(
                .element_id == "SBOM"
                and .score < 10
              )
            | {
                section_id,
                section_data_field,
                required,
                element_result,
                score
              }
          ' bsi-compliance.json

      - name: Upload SBOM evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cfomics-sbom-${{ github.sha }}
          path: |
            cfomics.cdx.json
            sbom-quality.json
            bsi-compliance.json
          if-no-files-found: error
          retention-days: 30

