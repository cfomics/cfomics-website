name: SBOM

on:
  push:
    branches:
      - main

  pull_request:

  workflow_dispatch:

permissions:
  contents: read

jobs:

  generate-sbom:

    name: Generate CycloneDX SBOM

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate CycloneDX SBOM
        run: |
          npx --yes @cyclonedx/cdxgen@12.7.1 \
            -t npm \
            --spec-version 1.6 \
            -o cfomics.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom
          path: cfomics.cdx.json
          if-no-files-found: error
          retention-days: 30
