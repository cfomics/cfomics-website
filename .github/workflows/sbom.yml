name: SBOM

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    name: Generate and assess CycloneDX SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate CycloneDX SBOM
        run: |
          npx --yes @cyclonedx/cdxgen@12.7.1 \
            -t npm \
            --spec-version 1.6 \
            -o cfomics.cdx.json

      - name: Install sbomqs
        uses: interlynk-io/sbomqs-action@v1

      - name: Score SBOM quality
        run: |
          sbomqs score cfomics.cdx.json --json > sbom-quality.json
          echo "SBOM quality score:"
          jq '.files[0].avg_score' sbom-quality.json

      - name: Assess BSI TR-03183-2 compliance
        continue-on-error: true
        run: |
          sbomqs compliance --bsi-v2 cfomics.cdx.json \
            --json > bsi-compliance.json

          echo "BSI compliance assessment:"
          cat bsi-compliance.json

      - name: Upload SBOM evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cfomics-sbom-${{ github.sha }}
          path: |
            cfomics.cdx.json
            sbom-quality.json
            bsi-compliance.json
          if-no-files-found: warn
          retention-days: 30
