name: Artifact Attestation

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  attest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate production SBOM
        run: |
          npx --yes @cyclonedx/cdxgen@12.7.1 \
            --required-only \
            --no-babel \
            --output cfomics.cdx.json

      - name: Attest SBOM
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: cfomics.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: attested-sbom
          path: cfomics.cdx.json