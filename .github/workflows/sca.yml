name: Software Composition Analysis

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  grype:
    name: Scan SBOM with Grype
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate CycloneDX SBOM
        run: |
          npx --yes @cyclonedx/cdxgen@12.7.1 \
            -t npm \
            --spec-version 1.6 \
            -o cfomics.cdx.json

      - name: Scan SBOM with Grype (SARIF)
        id: grype-sarif
        uses: anchore/scan-action@v7
        with:
          sbom: cfomics.cdx.json
          fail-build: false
          severity-cutoff: high
          output-format: sarif

      - name: Scan SBOM with Grype (JSON)
        id: grype-json
        uses: anchore/scan-action@v7
        with:
          sbom: cfomics.cdx.json
          fail-build: false
          severity-cutoff: high
          output-format: json
          output-file: grype-report.json

      - name: Install vexctl
        run: |
          curl --fail --location --silent --show-error \
            --output vexctl \
            https://github.com/openvex/vexctl/releases/download/v0.4.4/vexctl-linux-amd64

          chmod +x vexctl
          sudo mv vexctl /usr/local/bin/vexctl

      - name: Verify vexctl installation
        run: vexctl version

      - name: Validate OpenVEX document
        run: |
          vexctl validate security/vex/openvex.json

      - name: Upload SCA evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grype-scan-${{ github.sha }}
          path: |
            cfomics.cdx.json
            grype-report.json
            security/vex/openvex.json
            ${{ steps.grype-sarif.outputs.sarif }}
          if-no-files-found: warn
          retention-days: 30